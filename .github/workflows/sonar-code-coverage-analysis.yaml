name: '[Multi-Module] Go code coverage analysis'

on:
  push:
    branches:
      - main
    paths:
      - 'core-bootstrap/**'
      - 'cr-synchronizer/**'
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths:
      - 'core-bootstrap/**'
      - 'cr-synchronizer/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-code-coverage-analysis-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  sonar-analysis:
    name: Measure code coverage and upload to SonarCloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          cache: true
          cache-dependency-path: "**/*.sum"
          go-version: '1.26'

      - name: Run tests with coverage for core-bootstrap
        working-directory: core-bootstrap
        run: |
          go test -v -coverprofile=coverage.out ./... || true

      - name: Run tests with coverage for cr-synchronizer
        working-directory: cr-synchronizer
        run: |
          go test -v -coverprofile=coverage.out ./... || true

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY_CORE_BOOTSTRAP }}