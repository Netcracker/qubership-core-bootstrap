# Source: ratelimit/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: ratelimit-config
  labels:
    app: ratelimit
data:
  config.yaml: |
    domain: "auth_limit"
    separator: "|"
    descriptors:
      - key: ""
        rate_limit:
          unit: 1
          requests_per_unit: 60
      - key: path
        value: "/api/v1/.*"
        rate_limit:
          unit: 1
          requests_per_unit: 10
        descriptors:
        - key: user_id
          rate_limit:
            unit: 1
            requests_per_unit: 10
      - key: path
        value: "/health"
        rate_limit:
          unit: 1
          requests_per_unit: 100
        descriptors:
        - key: user_id
          rate_limit:
            unit: 1
            requests_per_unit: 100
      - key: path
        value: "/test"
        rate_limit:
          unit: 10
          requests_per_unit: 2
        descriptors:
        - key: user_id
          rate_limit:
            unit: 10
            requests_per_unit: 2
