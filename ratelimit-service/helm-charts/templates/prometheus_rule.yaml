{{- if and .Values.monitoring.enabled .Values.monitoring.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ratelimit-service
  namespace: {{ .Values.namespace }}
  labels:
    app: ratelimit-service
    {{- with .Values.monitoring.prometheusRule.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.monitoring.prometheusRule.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  groups:
  - name: ratelimit-service
    rules:
    - alert: RateLimitHighRejectionRate
      expr: |
        rate(ratelimit_requests_total{result="rejected"}[5m]) / rate(ratelimit_requests_total[5m]) > 0.1
      for: 5m
      labels:
        severity: warning
        component: ratelimit-service
      annotations:
        summary: "High rate limit rejection rate"
        description: "Rate limit rejection rate is above 10% for the last 5 minutes"
    - alert: RateLimitHighRejectionCount
      expr: increase(ratelimit_rejected_total[5m]) > 100
      for: 5m
      labels:
        severity: warning
        component: ratelimit-service
      annotations:
        summary: "High number of rejected requests"
        description: "More than 100 requests were rejected in the last 5 minutes"
    - alert: RateLimitServiceDown
      expr: up{job="ratelimit-service"} == 0
      for: 1m
      labels:
        severity: critical
        component: ratelimit-service
      annotations:
        summary: "RateLimit Service is down"
        description: "RateLimit Service pod has been down for more than 1 minute"
    - alert: RateLimitRedisDown
      expr: ratelimit_redis_operations_total{status="error"} > 0
      for: 1m
      labels:
        severity: critical
        component: ratelimit-service
      annotations:
        summary: "Redis connection issues"
        description: "RateLimit Service cannot connect to Redis"
{{- end }}