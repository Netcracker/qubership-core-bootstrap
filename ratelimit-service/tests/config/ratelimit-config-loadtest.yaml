apiVersion: v1
kind: ConfigMap
metadata:
  name: ratelimit-config-loadtest
  labels:
    rate-limit-config: "true"
    app: ratelimit
    purpose: load-test
data:
  config.yaml: |
    domain: auth_limit
    separator: "|"
    descriptors:
      # Глобальный лимит для load тестов
      - key: ""
        rate_limit:
          unit: second
          requests_per_unit: 1000
      
      # Основной лимит для тестового эндпоинта - 10 запросов в секунду на пользователя
      - key: path
        value: "/test"
        rate_limit:
          unit: second
          requests_per_unit: 50
        descriptors:
        - key: user_id
          rate_limit:
            unit: second
            requests_per_unit: 10
      
      # Дополнительный лимит для burst тестов
      - key: path
        value: "/burst"
        rate_limit:
          unit: second
          requests_per_unit: 100
        descriptors:
        - key: user_id
          rate_limit:
            unit: second
            requests_per_unit: 20
      
      # Жесткий лимит для spike тестов
      - key: path
        value: "/spike"
        rate_limit:
          unit: second
          requests_per_unit: 200
        descriptors:
        - key: user_id
          rate_limit:
            unit: second
            requests_per_unit: 5