apiVersion: v1
kind: Pod
metadata:
  name: k6-test-runner
  namespace: core-1-core
  labels:
    app: k6-test-runner
spec:
  containers:
  - name: k6
    image: grafana/k6:latest
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache curl
        echo "=== K6 Test Runner Ready ==="
        echo "Available tests: two-users, burst, distribution, gateway-test"
        tail -f /dev/null
    volumeMounts:
    - name: scripts
      mountPath: /scripts
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
  volumes:
  - name: scripts
    configMap:
      name: demo-test-scripts