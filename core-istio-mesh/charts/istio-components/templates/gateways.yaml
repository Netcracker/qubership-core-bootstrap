---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: '{{ .Values.ISTIO_PUBLIC_GATEWAY_NAME }}'
  annotations:
    helm.sh/hook: "pre-install, pre-upgrade"
    helm.sh/hook-weight: "-100"
    helm.sh/hook-delete-policy: "before-hook-creation"
  labels:
    app.kubernetes.io/name: '{{ .Values.ISTIO_PUBLIC_GATEWAY_NAME }}'
    app.kubernetes.io/instance: '{{ cat .Values.ISTIO_PUBLIC_GATEWAY_NAME "-" .Values.NAMESPACE | nospace | trunc 63 | trimSuffix "-" }}'
    app.kubernetes.io/component: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/version: {{ .Chart.version }}
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/processed-by-operator: 'istiod'
spec:
  gatewayClassName: istio
  listeners:
  - name: default
    port: 8080
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: '{{ .Values.ISTIO_PRIVATE_GATEWAY_NAME }}'
  annotations:
    helm.sh/hook: "pre-install, pre-upgrade"
    helm.sh/hook-weight: "-100"
    helm.sh/hook-delete-policy: "before-hook-creation"
  labels:
    app.kubernetes.io/name: '{{ .Values.ISTIO_PRIVATE_GATEWAY_NAME }}'
    app.kubernetes.io/instance: '{{ cat .Values.ISTIO_PRIVATE_GATEWAY_NAME "-" .Values.NAMESPACE | nospace | trunc 63 | trimSuffix "-" }}'
    app.kubernetes.io/component: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/version: {{ .Chart.version }}
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/processed-by-operator: 'istiod'
spec:
  gatewayClassName: istio
  listeners:
  - name: default
    port: 8080
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All